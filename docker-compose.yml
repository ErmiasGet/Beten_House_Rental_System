services:
  backend:
    build:
      context: ./desktop-app/backend
      dockerfile: ../../deployment/docker/backend/Dockerfile
    container_name: beten-homes-rent-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: 'https://betenhomesrent.com,http://localhost:80,http://localhost:3000'
    volumes:
      - uploads_data:/app/uploads
    networks:
      - beten-homes-rent-network

  frontend:
    build:
      context: ./desktop-app/frontend
      dockerfile: ../../deployment/docker/frontend/Dockerfile
    container_name: beten-homes-rent-frontend
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ssl_certs:/etc/ssl/certs
      - ssl_private:/etc/ssl/private
    depends_on:
      - backend
    networks:
      - beten-homes-rent-network

  certbot:
    image: certbot/certbot
    container_name: beten-homes-rent-certbot
    volumes:
      - ssl_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  uploads_data:
  ssl_certs:
  ssl_private:

networks:
  beten-homes-rent-network:
    driver: bridge
